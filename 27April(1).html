<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .card {
      width: 300px;
      margin: 50px auto; 
      padding: 20px; 
      background-color: #ffffff;
      border: 1px solid #ddd;
      border-radius: 12px;
      text-align: center;
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 16px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .card button {
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }

    .card button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Pavan Kumar</h2>
    <p>A passionate web developer learning HTML and CSS. Loves building simple and clean user interfaces.</p>
    <button>View Profile</button>
  </div>

</body>
</html>
